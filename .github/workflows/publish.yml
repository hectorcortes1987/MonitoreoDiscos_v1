name: Publicar ejecutable Windows

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependencias
        run: dotnet restore MonitoreoDiscos_v1/MonitoreoDiscos_v1.csproj

      - name: Publicar como ejecutable standalone
        run: >
          dotnet publish MonitoreoDiscos_v1/MonitoreoDiscos_v1.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output ./publish

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: MonitoreoDiscos_v1
          path: ./publish/MonitoreoDiscos_v1.exe
          retention-days: 30
